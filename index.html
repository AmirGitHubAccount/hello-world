<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Design tokens ── */
    :root {
      --btn-bg:        #38bdf8;
      --btn-bg-hover:  #0ea5e9;
      --btn-text:      #0c4a6e;
      --page-bg:       #f0f9ff;
      --radius:        12px;
      --transition:    0.18s ease;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--page-bg);
      transition: background 0.5s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    /* ── Button ── */
    #greet-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: inherit;
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: none;
      border-radius: var(--radius);
      padding: 0.85rem 2.25rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(56, 189, 248, 0.45);
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    #greet-btn:hover {
      background: var(--btn-bg-hover);
      box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
      transform: translateY(-2px);
    }

    #greet-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(14, 165, 233, 0.4);
    }

    /* ── Hello World text ── */
    #greeting {
      font-size: 72px;
      font-weight: 700;
      line-height: 1.1;
      text-align: center;

      /* Hidden until first click */
      opacity: 0;
      transform: translateY(24px);
      /* No transition on initial hidden state — animation drives the reveal */
    }

    /* Class toggled by JS to trigger the animation */
    #greeting.visible {
      animation: fadeSlideIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      #greeting { font-size: 52px; }
    }
  </style>
</head>
<body>

  <p id="greeting" aria-live="polite">Hello world</p>

  <button id="greet-btn" type="button">Say Hello</button>

  <script>
    // Vivid color palette — at least 10 colors
    const COLORS = [
      '#f43f5e', // rose
      '#f97316', // orange
      '#eab308', // yellow
      '#22c55e', // green
      '#14b8a6', // teal
      '#3b82f6', // blue
      '#8b5cf6', // violet
      '#ec4899', // pink
      '#06b6d4', // cyan
      '#a3e635', // lime
      '#fb923c', // amber-orange
      '#d946ef', // fuchsia
    ];

    // Background palette — light enough to keep button + text readable
    const BG_COLORS = [
      '#fde68a', // amber-200
      '#fbcfe8', // pink-200
      '#ddd6fe', // violet-200
      '#bfdbfe', // blue-200
      '#a7f3d0', // emerald-200
      '#fed7aa', // orange-200
      '#a5f3fc', // cyan-200
      '#e9d5ff', // purple-200
      '#f5d0fe', // fuchsia-200
      '#bbf7d0', // green-200
      '#fecaca', // red-200
      '#99f6e4', // teal-200
    ];

    const greeting = document.getElementById('greeting');
    const btn      = document.getElementById('greet-btn');

    let lastColorIndex  = -1;
    let lastBgIndex     = -1;

    function pickFrom(palette, lastIndex) {
      let index;
      do {
        index = Math.floor(Math.random() * palette.length);
      } while (index === lastIndex);
      return index;
    }

    function pickColor() {
      lastColorIndex = pickFrom(COLORS, lastColorIndex);
      return COLORS[lastColorIndex];
    }

    function pickBgColor() {
      lastBgIndex = pickFrom(BG_COLORS, lastBgIndex);
      return BG_COLORS[lastBgIndex];
    }

    btn.addEventListener('click', () => {
      // Re-trigger the animation by removing and re-adding the class
      greeting.classList.remove('visible');

      // Force reflow so the browser registers the class removal before re-adding
      void greeting.offsetWidth;

      greeting.style.color = pickColor();
      greeting.classList.add('visible');
      document.body.style.background = pickBgColor();
    });
  </script>

</body>
</html>
